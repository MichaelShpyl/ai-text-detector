<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Text Detector</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               max-width: 720px; margin: 3em auto; padding: 0 1em; color: #222; }
        h1 { font-weight: 500; }
        textarea { width: 100%; min-height: 220px; padding: 0.75em; font-size: 1em;
                   border: 1px solid #ccc; border-radius: 6px; font-family: inherit; }
        button { background: #2d6cdf; color: white; border: 0; padding: 0.6em 1.4em;
                 border-radius: 6px; font-size: 1em; cursor: pointer; margin-top: 1em; }
        button:hover { background: #1e54b0; }
        .meta { color: #888; font-size: 0.85em; margin-top: 2em; }
    </style>
</head>
<body>
    <h1>AI-Generated Text Detector</h1>
    <p>Paste a passage of text below. The model will predict whether it was written by a human or generated by an LLM, and return its confidence.</p>
    <form action="/predict" method="post">
        <textarea name="text" placeholder="Paste at least 20 characters of text..." required></textarea>
        <button type="submit">Detect</button>
    </form>
    <p class="meta">Model version: {{ model_version }} &middot; <a href="/health">/health</a> &middot; <a href="/metrics">/metrics</a></p>
</body>
</html>
