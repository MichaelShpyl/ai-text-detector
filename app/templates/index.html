<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Text Detector</title>
    <style>
        :root { --blue:#2d6cdf; --green:#1b8a4b; --red:#c0322b; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               max-width: 820px; margin: 2.5em auto; padding: 0 1.2em; color: #1f2430; line-height: 1.5; }
        h1 { font-weight: 600; margin-bottom: 0.15em; }
        .sub { color:#6b7280; margin-top:0; }
        textarea { width: 100%; min-height: 170px; padding: 0.8em; font-size: 1em;
                   border: 1px solid #cdd3dc; border-radius: 8px; font-family: inherit; resize: vertical; }
        .row { display:flex; gap:0.6em; align-items:center; flex-wrap:wrap; margin-top:0.8em; }
        button { background: var(--blue); color:#fff; border:0; padding:0.6em 1.3em;
                 border-radius:8px; font-size:1em; cursor:pointer; }
        button:hover { background:#1e54b0; }
        button:disabled { opacity:0.6; cursor:default; }
        button.ghost { background:#eef2f9; color:#33405a; }
        button.ghost:hover { background:#e2e8f4; }
        .card { border:1px solid #e5e8ee; border-radius:10px; padding:1.1em 1.2em; margin-top:1.4em; }
        .verdict { display:flex; align-items:baseline; gap:0.6em; flex-wrap:wrap; }
        .badge { font-size:1.35em; font-weight:700; padding:0.05em 0.5em; border-radius:8px; color:#fff; }
        .badge.human { background:var(--green); }
        .badge.ai { background:var(--red); }
        .conf { color:#374151; }
        .bar { height:10px; border-radius:6px; background:#eceff4; margin-top:0.6em; overflow:hidden; }
        .bar > div { height:100%; background:var(--blue); width:0; transition:width .3s; }
        h3 { margin:1.4em 0 0.4em; font-size:0.95em; color:#374151; }
        #heat { line-height:1.9; }
        #heat span { padding:2px 1px; border-radius:3px; }
        .meta { color:#8b93a1; font-size:0.85em; margin-top:2.2em; }
        .meta a { color:var(--blue); text-decoration:none; }
        .hidden { display:none; }
        .err { color:var(--red); margin-top:1em; }
    </style>
</head>
<body>
    <h1>AI-Generated Text Detector</h1>
    <p class="sub">Paste a passage. The model predicts human vs AI, gives its confidence, and shows which words it focused on.</p>

    <textarea id="text" placeholder="Paste at least 20 characters of text..."></textarea>
    <div class="row">
        <button id="go" onclick="analyse()">Analyse text</button>
        <button class="ghost" onclick="fillSample('human')">Load human example</button>
        <button class="ghost" onclick="fillSample('ai')">Load AI example</button>
    </div>

    <div id="err" class="err hidden"></div>

    <div id="result" class="card hidden">
        <div class="verdict">
            <span id="badge" class="badge">...</span>
            <span class="conf" id="conf"></span>
        </div>
        <div class="bar"><div id="barfill"></div></div>
        <h3>Why: words the model attended to most</h3>
        <div id="heat"></div>
    </div>

    <p class="meta">Model version: <span id="ver">{{ model_version }}</span> &middot;
        <a href="/health" target="_blank">/health</a> &middot;
        <a href="/metrics" target="_blank">/metrics</a></p>

    <script>
        const SAMPLES = {
            human: "honestly the worst part of moving house isn't the lifting, it's finding a box three weeks later with the one charger you actually needed in it. still living out of bags at this point.",
            ai: "There are several compelling reasons to incorporate regular exercise into your daily routine. Firstly, physical activity improves cardiovascular health and helps maintain a healthy weight. Secondly, it boosts mood by releasing endorphins. Finally, consistent exercise can improve sleep quality and increase overall energy levels throughout the day."
        };
        function fillSample(k){ document.getElementById('text').value = SAMPLES[k]; }
        function showErr(msg){
            const e = document.getElementById('err');
            e.textContent = msg; e.classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
        }
        async function analyse(){
            const text = document.getElementById('text').value.trim();
            document.getElementById('err').classList.add('hidden');
            if (text.length < 20){ showErr("Please paste at least 20 characters."); return; }
            const go = document.getElementById('go');
            go.disabled = true; go.textContent = "Analysing...";
            try {
                const [pred, exp] = await Promise.all([
                    fetch('/predict', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text})}).then(r=>r.json()),
                    fetch('/explain', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text})}).then(r=>r.json())
                ]);
                if (pred.error){ showErr(pred.error); return; }
                const isAI = pred.label === 'AI';
                const badge = document.getElementById('badge');
                badge.textContent = pred.label;
                badge.className = 'badge ' + (isAI ? 'ai' : 'human');
                document.getElementById('conf').textContent = (pred.confidence*100).toFixed(1) + '% confidence';
                document.getElementById('barfill').style.width = (pred.confidence*100).toFixed(0) + '%';
                document.getElementById('ver').textContent = pred.model_version;
                const heat = document.getElementById('heat');
                heat.innerHTML = '';
                if (exp.tokens && exp.weights && exp.weights.length){
                    const max = Math.max.apply(null, exp.weights) || 1;
                    exp.tokens.forEach((tok, i) => {
                        let t = tok, lead = ' ';
                        if (t.indexOf('##') === 0){ t = t.slice(2); lead = ''; }
                        const span = document.createElement('span');
                        span.textContent = lead + t;
                        span.style.background = 'rgba(255,159,28,' + (exp.weights[i]/max).toFixed(3) + ')';
                        heat.appendChild(span);
                    });
                } else {
                    heat.textContent = '(no attention returned)';
                }
                document.getElementById('result').classList.remove('hidden');
            } catch (e){
                showErr("Request failed: " + e.message);
            } finally {
                go.disabled = false; go.textContent = "Analyse text";
            }
        }
    </script>
</body>
</html>
