<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Result - AI Text Detector</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               max-width: 720px; margin: 3em auto; padding: 0 1em; color: #222; }
        .verdict { padding: 1.5em; border-radius: 8px; margin: 1.5em 0;
                   background: {% if label == "AI" %}#fce8e8{% else %}#e8f5e9{% endif %}; }
        .verdict h2 { margin: 0 0 0.4em 0;
                      color: {% if label == "AI" %}#b00020{% else %}#1b5e20{% endif %}; }
        .confidence { font-size: 1.1em; }
        a { color: #2d6cdf; }
    </style>
</head>
<body>
    <h1>Result</h1>
    <div class="verdict">
        <h2>{{ label }}</h2>
        <div class="confidence">Confidence: <strong>{{ "%.1f" | format(confidence * 100) }}%</strong></div>
    </div>
    <p>Model version: {{ model_version }}</p>
    <p><a href="/">← Try another</a></p>
</body>
</html>
