# ArgoCD Application that watches the k8s/ directory in this repo.
# Automated sync with prune + selfHeal means any commit to main that
# changes a manifest will roll the cluster automatically.
#
# Apply with:
#   kubectl apply -n argocd -f argoCD/application.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-text-detector
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MichaelShpyl/ai-text-detector.git
    targetRevision: main
    path: k8s
    directory:
      # kind-config.yaml is a Kind CLI config, not a k8s manifest, so don't apply it
      exclude: kind-config.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
