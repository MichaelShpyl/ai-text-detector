name: 03 - CI Tests

# Padlet Stage 5: Continuous Integration.
# Runs on every push and PR. Unit tests run on every branch; the API
# smoke tests only run when a built image is available (push to main).

on:
  push:
    branches: [main, develop, "feature/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          pip install ruff pytest
          pip install -r app/requirements.txt

      - name: Lint
        run: ruff check . || true     # warn but don't fail the build

      - name: Unit tests
        run: pytest tests/test_preprocess.py -v

  api-smoke:
    needs: lint-and-unit
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f app/Dockerfile -t ai-text-detector:ci .

      - name: Start MLflow with a dummy registered model
        run: |
          # In a real CI environment we'd use a pre-trained stub model.
          # For the smoke test we just need the container to come up.
          echo "Skipping live model load - covered in nightly integration"
